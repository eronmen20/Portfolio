<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)" rx="16"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="150" x2="1200" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="white" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="0" y1="750" x2="1200" y2="750" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="900" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="900" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="900" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="900" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="900" stroke="white" stroke-width="1"/>
  </g>

  <!-- DNA helix decorative -->
  <g transform="translate(900, 100)" opacity="0.15">
    <ellipse cx="50" cy="0" rx="40" ry="15" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="60" rx="40" ry="15" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="120" rx="40" ry="15" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="180" rx="40" ry="15" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="240" rx="40" ry="15" stroke="#3b82f6" stroke-width="2" fill="none"/>
    <ellipse cx="50" cy="300" rx="40" ry="15" stroke="#8b5cf6" stroke-width="2" fill="none"/>
    <line x1="10" y1="0" x2="90" y2="60" stroke="white" stroke-width="1"/>
    <line x1="90" y1="0" x2="10" y2="60" stroke="white" stroke-width="1"/>
    <line x1="10" y1="60" x2="90" y2="120" stroke="white" stroke-width="1"/>
    <line x1="90" y1="60" x2="10" y2="120" stroke="white" stroke-width="1"/>
    <line x1="10" y1="120" x2="90" y2="180" stroke="white" stroke-width="1"/>
    <line x1="90" y1="120" x2="10" y2="180" stroke="white" stroke-width="1"/>
    <line x1="10" y1="180" x2="90" y2="240" stroke="white" stroke-width="1"/>
    <line x1="90" y1="180" x2="10" y2="240" stroke="white" stroke-width="1"/>
    <line x1="10" y1="240" x2="90" y2="300" stroke="white" stroke-width="1"/>
    <line x1="90" y1="240" x2="10" y2="300" stroke="white" stroke-width="1"/>
  </g>

  <!-- Left content area: mock browser -->
  <rect x="80" y="200" width="600" height="450" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <!-- Browser bar -->
  <rect x="80" y="200" width="600" height="40" rx="12" fill="#1e293b"/>
  <circle cx="110" cy="220" r="6" fill="#ef4444"/>
  <circle cx="130" cy="220" r="6" fill="#eab308"/>
  <circle cx="150" cy="220" r="6" fill="#22c55e"/>
  <rect x="180" y="212" width="300" height="16" rx="8" fill="#334155"/>
  <text x="330" y="224" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">biolearn.vercel.app</text>

  <!-- Mock content inside browser -->
  <!-- Header -->
  <rect x="80" y="240" width="600" height="45" fill="#1e3a5f"/>
  <text x="110" y="268" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">🧬 BioLearn</text>
  <rect x="450" y="252" width="50" height="22" rx="11" fill="#3b82f6"/>
  <rect x="510" y="252" width="60" height="22" rx="11" fill="transparent" stroke="#475569" stroke-width="1"/>

  <!-- Sidebar -->
  <rect x="80" y="285" width="140" height="365" fill="#0c1524"/>
  <rect x="90" y="295" width="120" height="28" rx="6" fill="url(#accent)" opacity="0.2"/>
  <text x="100" y="314" fill="#3b82f6" font-family="sans-serif" font-size="11">📊 Dashboard</text>
  <text x="100" y="345" fill="#64748b" font-family="sans-serif" font-size="11">📚 Bab 1 - Sel</text>
  <text x="100" y="370" fill="#64748b" font-family="sans-serif" font-size="11">📚 Bab 2 - Genetika</text>
  <text x="100" y="395" fill="#64748b" font-family="sans-serif" font-size="11">🧫 Praktikum</text>
  <text x="100" y="420" fill="#64748b" font-family="sans-serif" font-size="11">📝 Quiz</text>
  <text x="100" y="445" fill="#64748b" font-family="sans-serif" font-size="11">📖 Glossary</text>
  <text x="100" y="470" fill="#64748b" font-family="sans-serif" font-size="11">📈 Progress</text>

  <!-- Main content area -->
  <rect x="220" y="285" width="460" height="365" fill="#0f172a"/>
  <!-- Cards -->
  <rect x="240" y="300" width="200" height="120" rx="8" fill="#1e293b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="460" y="300" width="200" height="120" rx="8" fill="#1e293b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="240" y="440" width="200" height="120" rx="8" fill="#1e293b" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="460" y="440" width="200" height="120" rx="8" fill="#1e293b" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Card icons -->
  <text x="260" y="335" font-size="24">📚</text>
  <text x="260" y="370" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">Bab 1: Sel</text>
  <text x="260" y="390" fill="#64748b" font-family="sans-serif" font-size="10">5 Sub-bab · 3 Quiz</text>
  
  <text x="480" y="335" font-size="24">🧬</text>
  <text x="480" y="370" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">Bab 2: Genetika</text>
  <text x="480" y="390" fill="#64748b" font-family="sans-serif" font-size="10">4 Sub-bab · 2 Quiz</text>

  <text x="260" y="475" font-size="24">🧫</text>
  <text x="260" y="510" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">Praktikum</text>
  <text x="260" y="530" fill="#64748b" font-family="sans-serif" font-size="10">Interactive Lab Guide</text>

  <text x="480" y="475" font-size="24">📊</text>
  <text x="480" y="510" fill="white" font-family="sans-serif" font-size="12" font-weight="bold">Progress</text>
  <text x="480" y="530" fill="#64748b" font-family="sans-serif" font-size="10">75% Complete</text>

  <!-- Right side: feature highlights -->
  <g transform="translate(760, 250)">
    <rect width="360" height="60" rx="12" fill="url(#accent)" opacity="0.1" stroke="url(#accent)" stroke-width="1"/>
    <text x="20" y="25" fill="white" font-family="sans-serif" font-size="13" font-weight="bold">⚡ Next.js 16 + Supabase</text>
    <text x="20" y="45" fill="#94a3b8" font-family="sans-serif" font-size="11">Full-Stack Biology Platform</text>
  </g>
  <g transform="translate(760, 330)">
    <rect width="360" height="50" rx="10" fill="#1e293b"/>
    <text x="20" y="30" fill="#94a3b8" font-family="sans-serif" font-size="11">🎯 Flashcards · Quiz · Praktikum</text>
  </g>
  <g transform="translate(760, 400)">
    <rect width="360" height="50" rx="10" fill="#1e293b"/>
    <text x="20" y="30" fill="#94a3b8" font-family="sans-serif" font-size="11">🔔 Real-time Announcements</text>
  </g>
  <g transform="translate(760, 470)">
    <rect width="360" height="50" rx="10" fill="#1e293b"/>
    <text x="20" y="30" fill="#94a3b8" font-family="sans-serif" font-size="11">📊 Admin Dashboard + Analytics</text>
  </g>
  <g transform="translate(760, 540)">
    <rect width="360" height="50" rx="10" fill="#1e293b"/>
    <text x="20" y="30" fill="#94a3b8" font-family="sans-serif" font-size="11">🌐 Bilingual (ID/EN) Content</text>
  </g>

  <!-- Bottom text -->
  <text x="600" y="780" text-anchor="middle" fill="#475569" font-family="monospace" font-size="13">BioLearn v3 — Interactive Biology Learning Platform</text>
  <text x="600" y="800" text-anchor="middle" fill="#334155" font-family="monospace" font-size="11">Replace with actual screenshot → public/images/projects/biolearn-app/</text>
</svg>